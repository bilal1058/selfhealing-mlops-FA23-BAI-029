global:
  resolve_timeout: 30s

route:
  receiver: jenkins-rollback-webhook
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1m

receivers:
  - name: jenkins-rollback-webhook
    webhook_configs:
      - url: 'http://YOUR_EC2_IP:8080/generic-webhook-trigger/invoke?token=YOUR_WEBHOOK_TOKEN'
        send_resolved: false
        http_config:
          basic_auth:
            username: 'YOUR_JENKINS_USER'
            password: 'YOUR_JENKINS_API_TOKEN'
