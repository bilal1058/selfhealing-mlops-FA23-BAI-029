global:

  resolve_timeout: 30s



route:

  receiver: jenkins-rollback-webhook

  group_wait: 10s

  group_interval: 10s

  repeat_interval: 1m



receivers:

  - name: jenkins-rollback-webhook

    webhook_configs:

      - url: 'http://13.207.67.12:8080/generic-webhook-trigger/invoke?token=ROLLBACK_E77CC3_TOKEN'

        send_resolved: false

        http_config:

          basic_auth:
            username: '${JENKINS_USER}'
            password: '${JENKINS_TOKEN}'
